<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <title>MERCREDIS TESLA — 3·6·9</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background: #08080c;
    }

    .scene {
      position: relative;
      width: 1920px;
      height: 1080px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #08080c;
      animation: sceneLife 7s forwards;
    }

    /* Subtle radial glow behind content */
    .scene::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 900px 500px at 50% 50%,
        rgba(212, 168, 67, 0.05) 0%,
        transparent 70%);
      pointer-events: none;
    }

    /* Horizontal rule lines */
    .line-top,
    .line-bottom {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 1px;
      background: linear-gradient(90deg,
        transparent 0%,
        rgba(212, 168, 67, 0.4) 20%,
        rgba(212, 168, 67, 0.8) 50%,
        rgba(212, 168, 67, 0.4) 80%,
        transparent 100%);
      animation: lineExpand 1.2s 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    .line-top  { top: calc(50% - 130px); }
    .line-bottom { top: calc(50% + 130px); }

    @keyframes lineExpand {
      to { width: 680px; }
    }

    /* Main content wrapper */
    .content {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 36px;
      opacity: 0;
      animation: fadeIn 1.5s 0.2s ease-out forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Eyebrow label */
    .eyebrow {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      letter-spacing: 0.45em;
      color: rgba(212, 168, 67, 0.55);
      text-transform: uppercase;
    }

    /* Main title */
    .title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 260px;
      line-height: 0.85;
      letter-spacing: 0.08em;
      color: #d4a843;
      text-align: center;
      /* Gold shimmer */
      background: linear-gradient(135deg,
        #8b6914 0%,
        #d4a843 30%,
        #f5d48a 50%,
        #d4a843 70%,
        #8b6914 100%);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 4s 1s ease-in-out infinite alternate;
      text-shadow: none;
      filter: drop-shadow(0 0 60px rgba(212, 168, 67, 0.25));
    }

    @keyframes shimmer {
      0%   { background-position: 0% 50%; }
      100% { background-position: 100% 50%; }
    }

    /* Subtitle */
    .subtitle {
      font-family: 'Cormorant Garamond', serif;
      font-size: 36px;
      font-weight: 300;
      font-style: italic;
      letter-spacing: 0.25em;
      color: rgba(255, 255, 255, 0.88);
      text-transform: uppercase;
      text-align: center;
      opacity: 0;
      animation: fadeIn 1.5s 0.9s ease-out forwards;
    }

    /* Scene fade-out at end */
    @keyframes sceneLife {
      0%   { opacity: 1; }
      85%  { opacity: 1; }
      100% { opacity: 0; }
    }

    /* Particle dots */
    .particles {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      border-radius: 50%;
      background: rgba(212, 168, 67, 0.6);
      animation: particleFade var(--dur) var(--delay) ease-in-out infinite;
    }

    @keyframes particleFade {
      0%   { opacity: 0; transform: translateY(0) scale(1); }
      50%  { opacity: 0.8; }
      100% { opacity: 0; transform: translateY(-60px) scale(0.5); }
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="particles" id="particles"></div>

    <div class="line-top"></div>
    <div class="line-bottom"></div>

    <div class="content">
      <span class="eyebrow">Mercredis Tesla</span>
      <h1 class="title">3 — 6 — 9</h1>
      <p class="subtitle">Le secret de l'univers</p>
    </div>
  </div>

  <script>
    const container = document.getElementById('particles');
    const count = 24;

    for (let i = 0; i < count; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const size = Math.random() * 3 + 1;
      p.style.cssText = `
        width: ${size}px;
        height: ${size}px;
        left: ${Math.random() * 100}%;
        top: ${Math.random() * 100}%;
        --dur: ${(Math.random() * 4 + 3).toFixed(1)}s;
        --delay: ${(Math.random() * 5).toFixed(1)}s;
        opacity: 0;
      `;
      container.appendChild(p);
    }
  </script>
</body>
</html>
